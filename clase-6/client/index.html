<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OskarChat</title>
    <script type="module">
      const getUsername = async () => {
        const username = localStorage.getItem("username");
        if (username && username !== "undefined" && username !== "null") {
          console.log(`Usuario existe ${username}`);
          return username;
        }

        const res = await fetch("https://randomuser.me/api/");
        const data = await res.json();

        const randomUsername = data.results[0].login.username;

        localStorage.setItem("username", randomUsername);
        return randomUsername;
      };

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const username = await getUsername();
      let lastMessageId = 0;

      const renderMessage = ({ id, content, user }) => {
        const item = `<li>
          <p>${content}</p>
          <small>${user}</small>
        </li>`;
        messages.insertAdjacentHTML("beforeend", item);
        lastMessageId = Math.max(lastMessageId, Number(id));
        messages.scrollTop = messages.scrollHeight;
      };

      const syncMessages = async () => {
        try {
          const response = await fetch(`/messages?after=${lastMessageId}`);
          if (!response.ok) return;

          const newMessages = await response.json();
          newMessages.forEach(renderMessage);
        } catch (error) {
          console.error(error);
        }
      };

      const sendMessage = async (content) => {
        try {
          const response = await fetch("/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              content,
              user: username,
            }),
          });

          if (!response.ok) return;

          const message = await response.json();
          renderMessage(message);
        } catch (error) {
          console.error(error);
        }
      };

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        if (input.value) {
          sendMessage(input.value);
          input.value = "";
        }
      });

      await syncMessages();
      setInterval(syncMessages, 2000);
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        display: grid;
        place-content: center;
        height: 100vh;
        padding: 36px;
        background: linear-gradient(160deg, #0f172a, #111827 55%, #1f2937);
        color: #e5e7eb;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow-y: scroll;
        height: 100%;
        scroll-behavior: smooth;
        padding-bottom: 48px;
        color: #e5e7eb;
      }

      #messages > li {
        padding: 0.5rem 1rem;
      }

      #messages > li:nth-child(odd) {
        background: rgba(255, 255, 255, 0.04);
      }

      #chat {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        overflow: hidden;
        width: min(92vw, 420px);
        height: min(82vh, 720px);
        position: relative;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      .chat-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        color: #e5e7eb;
        font-size: 0.95rem;
      }

      .chat-nav a {
        color: #7dd3fc;
        text-decoration: none;
        font-weight: 600;
      }

      #form {
        bottom: 0;
        display: flex;
        height: 48px;
        left: 0;
        padding: 4px;
        position: absolute;
        right: 0;
      }

      #input {
        border-radius: 9999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        flex: 1;
        margin: 4px;
        padding: 0 8px;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
      }

      #input:focus {
        outline: 0;
        border-color: #38bdf8;
      }

      #form > button {
        background: linear-gradient(135deg, #38bdf8, #2563eb);
        color: #fff;
        border: 0;
        margin: 4px;
        border-radius: 9999px;
        padding: 0 18px;
        font-weight: 600;
      }

      #form > button:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <section id="chat">
      <div class="chat-nav">
        <span>OskarChat</span>
        <a href="/">Volver a películas</a>
      </div>
      <ul id="messages"></ul>
      <form id="form">
        <input
          type="text"
          name="message"
          id="input"
          placeholder="Type a message"
          autocomplete="off"
        />
        <button type="submit">Enviar</button>
      </form>
    </section>
  </body>
</html>
